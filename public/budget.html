<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BudgetWise - Budget</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-wallet2"></i> BudgetWise</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"><i class="bi bi-list" style="font-size:1.5rem;color:var(--text-primary)"></i></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="transactions.html"><i class="bi bi-receipt"></i> Transactions</a></li>
          <li class="nav-item"><a class="nav-link active" href="budget.html"><i class="bi bi-pie-chart"></i> Budget</a></li>
          <li class="nav-item"><a class="nav-link" href="reports.html"><i class="bi bi-graph-up"></i> Reports</a></li>
          <li class="nav-item"><a class="nav-link" href="profile.html"><i class="bi bi-person"></i> Profile</a></li>
        </ul>
        <div class="d-flex align-items-center gap-2">
          <button id="themeToggle" onclick="toggleDarkMode()"><i class="bi bi-sun-fill"></i></button>
          <div class="dropdown">
            <button class="btn btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown"><i class="bi bi-person-circle"></i> <span id="navUserName">User</span></button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="profile.html"><i class="bi bi-person"></i> Profile</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item" href="#" onclick="logoutUser()"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div id="pageAlert"></div>

    <!-- Month/Year Selector -->
    <div class="row g-3 mb-4">
      <div class="col-auto">
        <label class="form-label">Month</label>
        <select class="form-select" id="budgetMonth" onchange="initBudgetPage()">
          <option value="1">January</option><option value="2">February</option>
          <option value="3">March</option><option value="4">April</option>
          <option value="5">May</option><option value="6">June</option>
          <option value="7">July</option><option value="8">August</option>
          <option value="9">September</option><option value="10">October</option>
          <option value="11">November</option><option value="12">December</option>
        </select>
      </div>
      <div class="col-auto">
        <label class="form-label">Year</label>
        <select class="form-select" id="budgetYear" onchange="initBudgetPage()">
        </select>
      </div>
    </div>

    <div class="row g-4">
      <!-- Set Budget Form -->
      <div class="col-lg-5">
        <div class="card">
          <div class="card-body">
            <h5 class="section-title"><i class="bi bi-pencil-square"></i> Set Monthly Budgets</h5>
            <form id="budgetForm" onsubmit="handleSaveBudgets(event)">
              <div id="budgetInputs"></div>
              <button type="submit" class="btn btn-primary w-100 mt-3"><i class="bi bi-check-lg"></i> Save All Budgets</button>
            </form>
          </div>
        </div>
      </div>

      <!-- Budget Overview -->
      <div class="col-lg-7">
        <!-- Overall Summary -->
        <div class="card mb-3">
          <div class="card-body">
            <h5 class="section-title"><i class="bi bi-bar-chart"></i> Overall Budget Summary</h5>
            <div class="row text-center mb-3">
              <div class="col-4">
                <p class="card-title">Total Budget</p>
                <p class="fw-bold" style="color:var(--primary);font-size:1.1rem;" id="totalBudgetSet">₹0</p>
              </div>
              <div class="col-4">
                <p class="card-title">Total Spent</p>
                <p class="fw-bold text-expense" style="font-size:1.1rem;" id="totalBudgetSpent">₹0</p>
              </div>
              <div class="col-4">
                <p class="card-title">Remaining</p>
                <p class="fw-bold text-income" style="font-size:1.1rem;" id="totalBudgetRemaining">₹0</p>
              </div>
            </div>
            <div class="progress" style="height:14px;">
              <div class="progress-bar" id="overallProgressBar" role="progressbar" style="width:0%"></div>
            </div>
          </div>
        </div>

        <!-- Category Budget Cards -->
        <div class="row g-3" id="budgetCards">
        </div>
      </div>
    </div>
  </main>

  <!-- Mobile Bottom Nav -->
  <div class="mobile-bottom-nav">
    <a href="dashboard.html"><i class="bi bi-speedometer2"></i>Dashboard</a>
    <a href="transactions.html"><i class="bi bi-receipt"></i>Transactions</a>
    <a href="budget.html" class="active"><i class="bi bi-pie-chart"></i>Budget</a>
    <a href="reports.html"><i class="bi bi-graph-up"></i>Reports</a>
    <a href="profile.html"><i class="bi bi-person"></i>Profile</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script>
    $(document).ready(function() {
      var user = checkAuth();
      applySavedTheme();
      $('#navUserName').text(user.name.split(' ')[0]);
      // Set current month/year
      var now = new Date();
      $('#budgetMonth').val(now.getMonth() + 1);
      // Populate year dropdown
      for (var y = now.getFullYear() - 2; y <= now.getFullYear() + 1; y++) {
        $('#budgetYear').append('<option value="' + y + '"' + (y === now.getFullYear() ? ' selected' : '') + '>' + y + '</option>');
      }
      initBudgetPage();
    });
  </script>
</body>
</html>
